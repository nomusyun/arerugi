.accordion{

.accordion summary{
    list-style:none;

async function openMobileCamera() {
    const modal = document.getElementById('cameraModal');
    if (modal) modal.style.display = 'flex';
    
    try {
        currentStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        const video = document.getElementById('cameraStream');
        if (video) video.srcObject = currentStream;
        
        setupShutterEvent();
    } catch (err) {
        console.error(err);
        closeCamera();
        const fileInput = document.getElementById('fileInput');
        if (fileInput) fileInput.click();
    }
}

function closeCamera() {
    const modal = document.getElementById('cameraModal');
    if (modal) modal.style.display = 'none';
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
    }
}

function setupShutterEvent() {
    const shutterBtn = document.getElementById('shutterBtn');
    if (!shutterBtn) return;

    const newShutterBtn = shutterBtn.cloneNode(true);
    shutterBtn.parentNode.replaceChild(newShutterBtn, shutterBtn);

    newShutterBtn.addEventListener('click', () => {
        const video = document.getElementById('cameraStream');
        if(!video || !video.videoWidth) {
            alert("カメラ映像の読み込みを待っています...");
            return;
        }

        const canvas = document.createElement('canvas');
        let w = video.videoWidth;
        let h = video.videoHeight;
        
        const maxSide = 450;
        if (w > maxSide || h > maxSide) {
            if (w > h) { h = Math.round(h * maxSide / w); w = maxSide; }
            else { w = Math.round(w * maxSide / h); h = maxSide; }
        }

        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);

        const base64Data = canvas.toDataURL("image/jpeg", 0.5);
        closeCamera();

        // 修正：外部サーバー送信ではなく、Blobオブジェクトに変換して直接OCRを開始
        const blob = base64ToBlob(base64Data, "image/jpeg");
        startOCR(blob);
    });
}

// Base64データをBlobデータに変換するヘルパー関数
function base64ToBlob(base64, mimeType) {
    const bytes = atob(base64.split(',')[1]);
    const ab = new ArrayBuffer(bytes.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < bytes.length; i++) {
        ia[i] = bytes.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeType });
}

async function startOCR(file) {
    // 修正：ローディング画面（読み込み中）を表示させる処理を追加
    const loadingElem = document.getElementById('loading');
    if (loadingElem) {
        loadingElem.style.display = 'flex';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('percentText').innerText = '0%';
        document.getElementById('secText').innerText = '--';
    }

    const processedImg = await preprocessImage(file);
    const lang = document.getElementById('langSelect').value;
    
    try {
        // 修正：Tesseract.js v4の正しい初期化方法（第1引数に言語、オプションにloggerを渡す）
        const worker = await Tesseract.createWorker(lang, 1, {
                logger: m => {
                    // 裏側の動きを確認用（F12キーの開発者ツールで確認できます）
                    console.log(m);

                    // ① AI辞書のダウンロード中の進捗（初回のみ30MBの通信が発生します）
                    if (m.status === 'loading language traineddata') {
                        const p = Math.round(m.progress * 100);
                        document.getElementById('progressBar').style.width = p + '%';
                        document.getElementById('percentText').innerText = p + '% (DL中)';
                    }
                    
                    // ② 実際の文字解読中の進捗
                    if (m.status === 'recognizing text') {
                        const p = Math.round(m.progress * 100);
                        document.getElementById('progressBar').style.width = p + '%';
                        document.getElementById('percentText').innerText = p + '%';
                        document.getElementById('secText').innerText = Math.max(0, Math.round((1 - m.progress) * 8));
                    }
                }
            });

        // 修正：v4では loadLanguage() や initialize() は自動実行されるため不要。パラメーター設定のみ行う
        await worker.setParameters({
            tessedit_pageseg_mode: 6,
            tessedit_ocr_engine_mode: 3,
            preserve_interword_spaces: "1",
            language_model_penalty_non_freq_dict_word: 0,
            language_model_penalty_non_dict_word: 0,
            tessedit_char_whitelist:
            "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789一-龯ぁ-んァ-ンー（）()・、,%/gml"
        });

        const rotatedImg = await rotateImage(processedImg, 1);
        const r1 = await worker.recognize(file);
        const r2 = await worker.recognize(processedImg);
        const r3 = await worker.recognize(rotatedImg);
        let mergedText =
        r1.data.text + " " +
        r2.data.text + " " +
        r3.data.text;
        
        mergedText = fixOcrErrors(mergedText);
        await worker.terminate();
        analyzeResult(mergedText);
        
    } catch (err) {
        console.error(err);
        alert("解析中にエラーが発生しました。もう一度お試しください。");
        document.getElementById('loading').style.display = 'none';
    }
}

async function rotateImage(base64, deg){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = ()=>{
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(deg * Math.PI / 180);
            ctx.drawImage(img, -img.width/2, -img.height/2);
            resolve(canvas.toDataURL("image/png"));
        };
        img.src = base64;
    });
}

async function preprocessImage(file){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = ()=>{
            const canvas = document.getElementById("hiddenCanvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width * 2;
            canvas.height = img.height * 2;
            ctx.drawImage(img,0,0,canvas.width,canvas.height)
            let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            let d = imgData.data;
            
            for(let i=0;i<d.length;i+=4){
                let r = d[i];
                let g = d[i+1];
                let b = d[i+2];
                let gray = 0.299*r + 0.587*g + 0.114*b;
                gray = (gray - 128) * 2.5 + 128;
                gray = Math.max(0, Math.min(255, gray));
                let v = gray > 140 ? 255 : 0;
                
                d[i]=v;
                d[i+1]=v;
                d[i+2]=v;
            }
            ctx.putImageData(imgData,0,0);
            resolve(canvas.toDataURL("image/png"));
        };
        img.src = URL.createObjectURL(file);
    });
}

function analyzeResult(scannedText){
    const area = document.getElementById('resultArea');
    
    // 修正：文字がうまく認識できなかった時、サイレント終了せずエラーカードを表示する
    if(!scannedText || scannedText.length < 3){
        console.log("OCR文字なし");
        document.getElementById('loading').style.display = 'none';
        area.style.display = 'block';
        area.className = 'card';
        area.style.background = '#f1f5f9';
        area.style.color = '#334155';
        area.innerHTML = `
            <div class="result-icon"><i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b;"></i></div>
            <div class="result-title">文字を読み取れませんでした</div>
            <div class="result-detail">ピントを合わせるか、明るい場所で、成分表が大きく写るようにハッキリ撮影してください。</div>
        `;
        return;
    }
    
    scannedText = fixOcrErrors(scannedText);       
    const cleanText = scannedText
    .replace(/[\s\n\r\t.,、。：:・()（）]/g,"")
    .toLowerCase();
    const checked = Array.from(document.querySelectorAll('#pickerModal input:checked')).map(i => i.value);
    const free = document.getElementById('freeInput').value;
    const targets = checked.concat(free ? [free] : []);
    const detected = [];
    targets.forEach(t => {
        const dict = allergyDict[t] || [t];
        if(dict.some(w => fuzzyMatch(cleanText, w.toLowerCase()))){
            detected.push(t);
        }
    });
    
    area.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    if(detected.length > 0){
        area.className = 'card status-danger';
        area.innerHTML = `
        <div class="result-icon"><i class="fa-solid fa-circle-xmark"></i></div>
        <div class="result-title">対象アレルギーが入っています<br>(NG)</div>
        <div class="result-detail">検出品目：${detected.join(', ')}</div>
        <div class="warning-note-v7">
            ⚠ AI判定です。誤判定の可能性があります。<br>
            必ず商品の原材料表示を確認してください。
            </div>
            `;
            playSound(false);
        }else{
            area.className = 'card status-safe';
            area.innerHTML = `
            <div class="result-icon"><i class="fa-solid fa-circle-check"></i></div>
